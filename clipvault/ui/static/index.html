<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipVault</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app-shell" class="app-shell">
  <aside class="app-sidebar">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">ClipVault</span>
    </a>

    <nav class="side-nav" aria-label="主导航">
      <button class="side-nav-item active" data-tab="home" type="button">
        <span class="nav-icon" aria-hidden="true">⌂</span>
        <span class="nav-label">主页</span>
      </button>
      <button class="side-nav-item" data-tab="settings" type="button">
        <span class="nav-icon" aria-hidden="true">⚙</span>
        <span class="nav-label">设置</span>
      </button>
    </nav>

    <button id="sidebar-toggle" class="sidebar-toggle" type="button">
      <span class="collapse-icon" aria-hidden="true">«</span>
      <span class="nav-label">收起侧边栏</span>
    </button>
  </aside>

  <main id="main-content">
    <section id="tab-home" class="tab-pane active">
      <div class="home-topbar">
        <div></div>
        <div id="env-status" class="env-status">
          <span class="env-dot"></span>
          <span>正在连接本地库...</span>
        </div>
      </div>

      <section id="intake-section" class="home-card intake-card">
        <div class="module-head">
          <div>
            <h1>获取字幕</h1>
            <p>把视频里的语言安静收藏到本地。</p>
          </div>
          <button id="intake-collapse" class="btn-secondary btn-small intake-collapse-button" type="button">收起获取区</button>
        </div>

        <div id="intake-body" class="intake-body">
          <div class="intake-mode-tabs" role="tablist" aria-label="获取字幕模式">
            <button class="mode-tab active" data-intake-mode="video" type="button">视频</button>
            <button class="mode-tab" data-intake-mode="collection" type="button">合集</button>
            <button class="mode-tab" data-intake-mode="source" type="button">来源</button>
          </div>

          <div class="intake-grid">
            <div class="intake-form">
              <p id="intake-description" class="mode-description">粘贴单个视频链接，ClipVault 会优先获取平台字幕；没有字幕时再使用本地 ASR。</p>

              <label class="field-block">
                <span id="intake-primary-label">视频链接</span>
                <input id="intake-primary" class="text-input" type="text" placeholder="例如：https://www.bilibili.com/video/BV..." />
              </label>

              <label class="field-block">
                <span id="intake-secondary-label">保存到合集（可选）</span>
                <input id="intake-secondary" class="text-input" type="text" placeholder="例如：AI 工具观察" />
              </label>

              <details id="intake-advanced" class="advanced-options">
                <summary>高级选项</summary>
                <div class="advanced-grid">
                  <label>
                    <span>ASR 模型</span>
                    <select id="intake-model" class="text-input">
                      <option value="small">small</option>
                      <option value="tiny">tiny</option>
                      <option value="medium">medium</option>
                      <option value="large-v3">large-v3</option>
                    </select>
                  </label>
                  <label>
                    <span>设备</span>
                    <select id="intake-device" class="text-input">
                      <option value="auto">自动选择</option>
                      <option value="cuda">CUDA</option>
                      <option value="cpu">CPU</option>
                    </select>
                  </label>
                  <label class="check-row">
                    <input id="intake-force" type="checkbox" />
                    <span>强制重处理</span>
                  </label>
                  <label class="check-row">
                    <input id="intake-keep-audio" type="checkbox" />
                    <span>保留音频</span>
                  </label>
                </div>
              </details>

              <button id="intake-start" class="btn-primary" type="button">开始获取字幕</button>
            </div>

            <aside class="status-panel">
              <div class="status-panel-head">
                <h2>当前状态</h2>
                <button id="detail-log-toggle" class="text-button" type="button">查看详细日志</button>
              </div>
              <div id="human-status-empty" class="human-empty">当前没有正在处理的内容。开始获取字幕后，进度会显示在这里。</div>
              <ol id="human-steps" class="human-steps"></ol>
              <div class="progress-row">
                <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
                <span id="progress-label">0%</span>
              </div>
              <div id="detail-log-box" class="detail-log-box collapsed">
                <div id="detail-log-actions" class="detail-actions"></div>
                <div id="detail-log" class="log-console"></div>
              </div>
            </aside>
          </div>
        </div>
      </section>

      <section class="home-card favorites-card">
        <div class="module-head compact">
          <div>
            <h1>收藏夹</h1>
            <p>你的字幕库，支持全文搜索。</p>
          </div>
        </div>

        <div class="library-toolbar">
          <div class="library-tabs" role="tablist" aria-label="收藏夹模式">
            <button class="mode-tab active" data-library-mode="subtitles" type="button">字幕</button>
            <button class="mode-tab" data-library-mode="collections" type="button">合集</button>
            <button class="mode-tab" data-library-mode="sources" type="button">来源</button>
          </div>
          <label class="search-wrap">
            <span aria-hidden="true">⌕</span>
            <input id="library-search" type="search" placeholder="搜索字幕、标题、创作者或某句话..." />
          </label>
        </div>

        <div id="library-list" class="library-list"></div>
      </section>
    </section>

    <section id="tab-settings" class="tab-pane">
      <div class="settings-page">
        <div class="settings-head">
          <h1>设置</h1>
          <p>把机器参数和本地路径收在这里，主页只保留常用流程。</p>
        </div>

        <div class="settings-grid">
          <section class="settings-card">
            <h2>本地字幕库</h2>
            <label class="field-block">
              <span>字幕库路径</span>
              <input id="set-library" class="text-input" type="text" placeholder="E:/myproject/ClipVault/library" />
            </label>
            <div class="settings-actions">
              <button id="settings-rebuild" class="btn-secondary" type="button">重建索引</button>
            </div>
          </section>

          <section class="settings-card">
            <h2>字幕获取</h2>
            <label class="field-block">
              <span>默认 ASR 模型</span>
              <select id="set-model" class="text-input">
                <option value="tiny">tiny</option>
                <option value="small">small</option>
                <option value="medium">medium</option>
                <option value="large-v3">large-v3</option>
              </select>
            </label>
            <label class="field-block">
              <span>默认设备</span>
              <select id="set-device" class="text-input">
                <option value="auto">自动选择</option>
                <option value="cuda">CUDA</option>
                <option value="cpu">CPU</option>
              </select>
            </label>
            <label class="field-block">
              <span>计算类型</span>
              <select id="set-compute-type" class="text-input">
                <option value="auto">auto</option>
                <option value="int8">int8</option>
                <option value="int8_float16">int8_float16</option>
                <option value="float16">float16</option>
                <option value="float32">float32</option>
              </select>
            </label>
            <label class="check-row">
              <input id="set-simplify-chinese" type="checkbox" checked />
              <span>ASR 中文默认转简</span>
            </label>
          </section>

          <section class="settings-card">
            <h2>平台登录</h2>
            <label class="field-block">
              <span>Cookie 文件路径</span>
              <input id="set-cookies" class="text-input" type="text" placeholder="可选" />
            </label>
          </section>
        </div>

        <button id="settings-save" class="btn-primary" type="button">保存设置</button>
      </div>
    </section>
  </main>
</div>

<script src="/app.js"></script>
</body>
</html>
